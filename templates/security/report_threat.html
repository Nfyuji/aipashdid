{% extends 'base.html' %}
{% block title %}إبلاغ عن تهديد - PhishDetector{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-bug"></i> إبلاغ عن تهديد</h1>
    <p class="text-muted">تسجيل حدث أمني أو محاولة هجوم جديد</p>
</div>
<div class="card" style="max-width: 600px;">
    <form method="post" action="{{ url_for('security.report_threat') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>عنوان التهديد *</label>
            <input type="text" name="title" class="form-control" placeholder="مثال: محاولة تصيد من نطاق مجهول" required>
        </div>
        <div class="form-group">
            <label>الوصف</label>
            <textarea name="description" class="form-control" rows="4" placeholder="تفاصيل التهديد أو مصدره..."></textarea>
        </div>
        <div class="form-group">
            <label>الخطورة</label>
            <select name="severity" class="form-control">
                <option value="low">منخفض</option>
                <option value="medium" selected>متوسط</option>
                <option value="high">عالي</option>
                <option value="critical">حرج</option>
            </select>
        </div>
        <div class="form-group">
            <label>IP المصدر (اختياري)</label>
            <input type="text" name="source_ip" class="form-control" placeholder="مثال: 192.168.1.1">
        </div>
        <div class="form-group">
            <label>رمز الدولة (اختياري)</label>
            <input type="text" name="country_code" class="form-control" placeholder="مثال: SA, US" maxlength="10">
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> تسجيل التهديد</button>
        <a href="{{ url_for('security.attack_details') }}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
{% endblock %}
