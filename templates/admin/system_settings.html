{% extends 'base.html' %}
{% block title %}إعدادات النظام - PhishDetector{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-cog"></i> إعدادات النظام</h1>
    <p class="text-muted">سياسة كلمات المرور، الإشعارات، وضع الصيانة، النسخ الاحتياطي</p>
</div>
<div class="card" style="max-width: 500px;">
    <form method="post" action="{{ url_for('admin.system_settings') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>أقل طول لكلمة المرور</label>
            <input type="number" name="password_min_length" class="form-control" value="{{ password_min_length }}" min="6" max="32">
        </div>
        <div class="form-group">
            <label>إشعار الأدمن عند رسالة عالية الخطورة</label>
            <select name="notify_high_risk" class="form-control">
                <option value="1" {{ 'selected' if notify_high_risk == '1' }}>نعم</option>
                <option value="0" {{ 'selected' if notify_high_risk == '0' }}>لا</option>
            </select>
        </div>
        <div class="form-group">
            <label>وضع الصيانة</label>
            <select name="maintenance_mode" class="form-control">
                <option value="0" {{ 'selected' if maintenance_mode == '0' }}>معطّل</option>
                <option value="1" {{ 'selected' if maintenance_mode == '1' }}>مفعّل</option>
            </select>
        </div>
        <div class="form-group">
            <label>إصدار النظام</label>
            <input type="text" name="system_version" class="form-control" value="{{ system_version }}">
        </div>
        <button type="submit" class="btn btn-primary">حفظ الإعدادات</button>
    </form>
</div>
<div class="card" style="margin-top:1rem;">
    <h3 style="margin-bottom:0.5rem;"><i class="fas fa-database"></i> النسخ الاحتياطي والاستعادة</h3>
    <p><a href="{{ url_for('admin.backup') }}" class="btn btn-primary"><i class="fas fa-download"></i> تنزيل نسخة احتياطية (DB)</a></p>
    <p><a href="{{ url_for('admin.restore') }}" class="btn btn-secondary"><i class="fas fa-upload"></i> استعادة من ملف</a></p>
</div>
{% endblock %}
