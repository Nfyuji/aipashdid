{% extends 'base.html' %}
{% block title %}إرسال رسالة - PhishDetector{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-paper-plane"></i> إرسال رسالة داخلية</h1>
</div>
<div class="card" style="max-width: 500px;">
    <form method="post" action="{{ url_for('admin.message_send') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>المستلم</label>
            <select name="receiver_id" class="form-control" required>
                <option value="">— اختر —</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.full_name }} ({{ u.username }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>الموضوع</label>
            <input type="text" name="subject" class="form-control" required>
        </div>
        <div class="form-group">
            <label>النص</label>
            <textarea name="body" class="form-control" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">إرسال</button>
        <a href="{{ url_for('admin.messages_inbox') }}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
{% endblock %}
