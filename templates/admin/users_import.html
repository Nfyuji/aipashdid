{% extends 'base.html' %}
{% block title %}استيراد المستخدمين - PhishDetector{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-file-import"></i> استيراد المستخدمين</h1>
    <p class="text-muted">رفع ملف CSV بأعمدة: username, email, full_name, role, department, password, is_active</p>
</div>
<div class="card" style="max-width: 500px;">
    <form method="post" action="{{ url_for('admin.users_import') }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>ملف CSV</label>
            <input type="file" name="file" accept=".csv" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">استيراد</button>
        <a href="{{ url_for('admin.users_manage') }}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
<p class="text-muted" style="margin-top:1rem;">يمكنك <a href="{{ url_for('admin.users_export') }}">تصدير المستخدمين الحاليين</a> كمرجع لصيغة الملف.</p>
{% endblock %}
