{% extends 'base.html' %}
{% block title %}استعادة النسخة الاحتياطية - PhishDetector{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-upload"></i> استعادة النسخة الاحتياطية</h1>
    <p class="text-muted">رفع ملف .db لاستبدال قاعدة البيانات الحالية (احذر: سيتم استبدال كل البيانات)</p>
</div>
<div class="card" style="max-width: 500px;">
    <form method="post" action="{{ url_for('admin.restore') }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>ملف قاعدة البيانات (.db)</label>
            <input type="file" name="file" accept=".db" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">استعادة</button>
        <a href="{{ url_for('admin.system_settings') }}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
{% endblock %}
