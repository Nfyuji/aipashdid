{% extends 'base.html' %}
{% block title %}{{ 'تعديل المهمة' if task else 'إضافة مهمة' }} - PhishDetector{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-tasks"></i> {{ 'تعديل المهمة' if task else 'إضافة مهمة' }}</h1>
</div>
<div class="card" style="max-width: 600px;">
    <form method="post" action="{{ url_for('admin.task_edit', task_id=task.id) if task else url_for('admin.task_add') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>العنوان</label>
            <input type="text" name="title" class="form-control" value="{{ task.title if task else '' }}" required>
        </div>
        <div class="form-group">
            <label>الوصف</label>
            <textarea name="description" class="form-control" rows="3">{{ task.description if task else '' }}</textarea>
        </div>
        <div class="form-group">
            <label>الحالة</label>
            <select name="status" class="form-control">
                <option value="pending" {{ 'selected' if task and task.status == 'pending' }}>قيد الانتظار</option>
                <option value="in_progress" {{ 'selected' if task and task.status == 'in_progress' }}>قيد التنفيذ</option>
                <option value="done" {{ 'selected' if task and task.status == 'done' }}>منتهية</option>
                <option value="cancelled" {{ 'selected' if task and task.status == 'cancelled' }}>ملغاة</option>
            </select>
        </div>
        <div class="form-group">
            <label>الأولوية</label>
            <select name="priority" class="form-control">
                <option value="low" {{ 'selected' if task and task.priority == 'low' }}>منخفضة</option>
                <option value="medium" {{ 'selected' if not task or task.priority == 'medium' }}>متوسطة</option>
                <option value="high" {{ 'selected' if task and task.priority == 'high' }}>عالية</option>
                <option value="urgent" {{ 'selected' if task and task.priority == 'urgent' }}>عاجلة</option>
            </select>
        </div>
        <div class="form-group">
            <label>المُعيَّن إليه</label>
            <select name="assigned_to_id" class="form-control">
                <option value="">— لا أحد —</option>
                {% for u in users %}
                <option value="{{ u.id }}" {{ 'selected' if task and task.assigned_to_id == u.id }}>{{ u.full_name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{{ url_for('admin.tasks_list') }}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
{% endblock %}
